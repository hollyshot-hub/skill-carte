<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スキルカルテ</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#f7f7f5;--surface:#fff;--border:#e4e2dc;--border-med:#ccc9c0;
    --text:#1a1a18;--muted:#6b6b66;--hint:#9e9d97;
    --accent:#1a6b4a;--accent-l:#e4f2eb;--accent-t:#0d4a32;
    --amber:#f0a500;--amber-l:#fff8e6;--amber-t:#7a5200;
    --blue:#2563a8;--blue-l:#e8f0fc;--blue-t:#1a3d6b;
    --purple:#6b3fa0;--purple-l:#f0ebfa;--purple-t:#3d1e66;
    --teal:#0d7a6b;--teal-l:#e4f5f2;--teal-t:#084d42;
    --coral:#c0392b;--coral-l:#fdecea;
    --r:8px;--rl:12px;--sh:0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
  .app{display:flex;height:100vh;overflow:hidden}
  .sb{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .sb-hd{padding:14px 16px;border-bottom:1px solid var(--border)}
  .sb-hd h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
  .sb-tools{padding:10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
  .sb-tools input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text)}
  .sb-tools input:focus{outline:2px solid var(--accent);border-color:transparent}
  .fr{display:flex;gap:4px}
  .fb{flex:1;padding:5px 3px;font-size:11px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--muted);cursor:pointer;text-align:center;white-space:nowrap}
  .fb.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent-t);font-weight:500}
  .emp-list{flex:1;overflow-y:auto;padding:8px}
  .ei{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:background .1s}
  .ei:hover{background:var(--bg)}
  .ei.on{background:var(--accent-l);border-color:var(--accent)}
  .av{width:36px;height:36px;border-radius:50%;background:var(--blue-l);color:var(--blue-t);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .ei-info{flex:1;min-width:0}
  .ei-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ei-meta{font-size:11px;color:var(--hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-ft{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
  .cnt{font-size:12px;color:var(--hint);text-align:center;padding:2px 0}
  .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
  .sync-ok{background:#1a6b4a}.sync-ng{background:#c0392b}.sync-ing{background:#f0a500}
  .main{flex:1;overflow-y:auto}
  .mi{max-width:800px;margin:0 auto;padding:24px 20px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:var(--surface);color:var(--text);transition:background .1s}
  .btn:hover{background:var(--bg)}
  .btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-p:hover{background:var(--accent-t);border-color:var(--accent-t)}
  .btn-d{color:var(--coral);border-color:#f5c6c2}
  .btn-d:hover{background:var(--coral-l)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-fw{width:100%;justify-content:center}
  .welcome{text-align:center;padding:60px 20px}
  .welcome h2{font-size:22px;font-weight:600;margin-bottom:10px}
  .welcome p{color:var(--muted);margin-bottom:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
  .ct{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fi{display:flex;flex-direction:column;gap:5px}
  .fi.full{grid-column:1/-1}
  .fi label{font-size:12px;font-weight:500;color:var(--muted)}
  .fi input,.fi select,.fi textarea{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);transition:border .15s}
  .fi input:focus,.fi select:focus,.fi textarea:focus{outline:2px solid var(--accent);border-color:transparent;background:#fff}
  .fi textarea{resize:vertical;min-height:72px}
  .ph{display:flex;align-items:center;gap:16px;margin-bottom:20px}
  .pav{width:60px;height:60px;border-radius:50%;background:var(--blue-l);color:var(--blue-t);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0}
  .pname{font-size:22px;font-weight:700}
  .psub{font-size:14px;color:var(--muted);margin-top:2px}
  .br{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500}
  .b-blue{background:var(--blue-l);color:var(--blue-t)}
  .b-green{background:var(--accent-l);color:var(--accent-t)}
  .b-amber{background:var(--amber-l);color:var(--amber-t)}
  .b-purple{background:var(--purple-l);color:var(--purple-t)}
  .b-teal{background:var(--teal-l);color:var(--teal-t)}
  .b-gray{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
  .cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
  .cbtn{padding:10px 6px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;text-align:center;color:var(--muted);transition:all .1s}
  .cbtn:hover{border-color:var(--border-med);color:var(--text);background:var(--surface)}
  .cbtn.on{border:2px solid var(--accent);background:var(--accent-l);color:var(--accent-t);font-weight:600}
  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
  .sbtn{padding:7px 4px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;text-align:center;color:var(--muted)}
  .sbtn.on{border:2px solid var(--accent);background:var(--accent-l);color:var(--accent-t);font-weight:600}
  .slabel{font-size:12px;color:var(--muted);margin-top:10px;margin-bottom:5px}
  .cat-block{margin-bottom:4px;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
  .cat-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);cursor:pointer;user-select:none}
  .cat-hd-left{display:flex;align-items:center;gap:10px}
  .cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .cat-name{font-size:14px;font-weight:600}
  .cat-avg{font-size:12px;color:var(--muted)}
  .cat-chevron{font-size:12px;color:var(--hint);transition:transform .2s}
  .cat-chevron.open{transform:rotate(180deg)}
  .cat-body{display:none;padding:8px 14px 12px}
  .cat-body.open{display:block}
  .sk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
  .sk-row:last-child{border-bottom:none}
  .sk-name{flex:1;font-size:14px}
  .stars{display:flex;gap:3px}
  .star{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .1s}
  .star.on{background:var(--amber-l);border-color:var(--amber)}
  .sk-lv{font-size:11px;color:var(--hint);min-width:52px;text-align:right}
  .tw{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text)}
  .tag button{background:none;border:none;cursor:pointer;color:var(--hint);font-size:14px;line-height:1;padding:0}
  .tag button:hover{color:var(--coral)}
  .cert-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
  .cert-btn{padding:10px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;text-align:center;color:var(--muted);transition:all .1s;display:flex;align-items:center;justify-content:center;gap:6px}
  .cert-btn:hover{border-color:var(--border-med);color:var(--text);background:var(--surface)}
  .cert-btn.on{border:2px solid var(--accent);background:var(--accent-l);color:var(--accent-t);font-weight:600}
  .cert-other-row{display:flex;gap:8px;margin-top:4px}
  .add-row{display:flex;gap:8px;margin-top:10px}
  .add-row input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text)}
  .add-row input:focus{outline:2px solid var(--accent);border-color:transparent}
  .rw{display:flex;justify-content:center;padding:8px 0}
  .ab{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap}
  .ab h2{font-size:20px;font-weight:700}
  .ab-btns{display:flex;gap:8px;flex-wrap:wrap}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
  .tab{padding:8px 16px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:500;color:#fff;background:var(--accent);box-shadow:0 4px 12px rgba(0,0,0,.15);display:none;z-index:999;white-space:nowrap}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center}
  .ov.open{display:flex}
  .dlg{background:var(--surface);border-radius:var(--rl);padding:24px;width:90%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
  .dlg h3{font-size:18px;font-weight:600;margin-bottom:8px}
  .dlg p{font-size:14px;color:var(--muted);margin-bottom:20px}
  .dlg-btns{display:flex;gap:8px;justify-content:flex-end}
  .empty{text-align:center;padding:32px 20px;color:var(--hint);font-size:14px}
  .score-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .score-card{background:var(--bg);border-radius:var(--r);padding:12px;text-align:center}
  .score-card .sc-val{font-size:26px;font-weight:700}
  .score-card .sc-label{font-size:12px;color:var(--muted);margin-top:2px}
  .dot-調理技術{background:#2563a8}.dot-衛生管理{background:#1a6b4a}
  .dot-学校対応{background:#f0a500}.dot-組織構築{background:#6b3fa0}.dot-その他{background:#6b6b66}
  .hd-調理技術{background:#e8f0fc}.hd-衛生管理{background:#e4f2eb}
  .hd-学校対応{background:#fff8e6}.hd-組織構築{background:#f0ebfa}.hd-その他{background:#f0f0ee}
  /* Setup screen */
  .setup{max-width:520px;margin:60px auto;padding:0 20px}
  .setup h2{font-size:20px;font-weight:700;margin-bottom:8px}
  .setup p{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.7}
  .setup .fi{margin-bottom:12px}
  .setup .fi input{width:100%}
  .setup-note{font-size:12px;color:var(--hint);margin-top:16px;line-height:1.7;background:var(--bg);border-radius:var(--r);padding:12px}
  @media(max-width:600px){
    .app{flex-direction:column;height:auto}
    .sb{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border)}
    .emp-list{max-height:200px}
    .fg{grid-template-columns:1fr}
    .score-grid{grid-template-columns:1fr 1fr}
    .ab-btns{gap:5px}
    .btn-sm{padding:5px 8px;font-size:11px}
  }
  @media print{
    .sb,.ab-btns,.tabs,.btn{display:none!important}
    .main{overflow:visible}
    .card{box-shadow:none;border:1px solid #ccc}
    .cat-body{display:block!important}
  }
</style>
</head>
<body>

<!-- Password auth screen -->
<div id="auth-screen" style="display:none">
  <div style="max-width:360px;margin:120px auto;padding:0 20px;text-align:center">
    <div style="font-size:36px;margin-bottom:12px">📋</div>
    <h2 style="font-size:20px;font-weight:600;margin-bottom:8px">スキルカルテ</h2>
    <p style="font-size:14px;color:#6b6b66;margin-bottom:24px">パスワードを入力してください</p>
    <input id="pw-input" type="password" placeholder="パスワード"
      style="width:100%;padding:10px 12px;border:1px solid #e4e2dc;border-radius:8px;font-size:15px;margin-bottom:10px;font-family:inherit"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="color:#c0392b;font-size:13px;margin-bottom:10px;display:none">パスワードが違います</div>
    <button onclick="checkPw()"
      style="width:100%;padding:12px;background:#1a6b4a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer">ログイン</button>
  </div>
</div>

<!-- Setup screen (shown before Supabase is configured) -->
<div id="setup-screen" style="display:none">
  <div class="setup">
    <h2>⚙️ 初期設定</h2>
    <p>Supabaseの接続情報を入力してください。<br>一度設定するとこの画面は表示されません。</p>
    <div class="fi"><label>Supabase Project URL</label>
      <input id="cfg-url" type="url" placeholder="https://xxxxxxxxxxxx.supabase.co">
    </div>
    <div class="fi"><label>Supabase Anon Key</label>
      <input id="cfg-key" type="text" placeholder="eyJhbGciOiJIUzI1NiIs...">
    </div>
    <button class="btn btn-p btn-fw" style="margin-top:8px" onclick="saveConfig()">接続して始める</button>
    <div class="setup-note">
      ※ 入力した情報はこのブラウザのlocalStorageにのみ保存されます。<br>
      ※ Supabase管理画面 → Project Settings → API から取得できます。<br>
      ※ 設定をリセットするにはサイドバー下部の「設定リセット」を使ってください。
    </div>
  </div>
</div>

<!-- Main app -->
<div class="app" id="main-app" style="display:none">
  <aside class="sb">
    <div class="sb-hd"><h1><span>📋</span> スキルカルテ</h1></div>
    <div class="sb-tools">
      <input type="search" id="search" placeholder="氏名（苗字）・事業所で検索…" oninput="renderList()">
      <div class="fr">
        <button class="fb on" data-filter="all" onclick="setFilter(this)">全員</button>
        <button class="fb" data-filter="社員" onclick="setFilter(this)">社員</button>
        <button class="fb" data-filter="ロングパート" onclick="setFilter(this)">ロング</button>
        <button class="fb" data-filter="パート" onclick="setFilter(this)">パート</button>
      </div>
    </div>
    <div class="emp-list" id="emp-list"><div class="empty">読み込み中…</div></div>
    <div class="sb-ft">
      <div class="cnt" id="cnt">
        <span class="sync-dot sync-ok" id="sync-dot"></span>
        <span id="cnt-text">0 名</span>
      </div>
      <button class="btn btn-p btn-fw" onclick="newEmp()">＋ 新しいカルテ</button>
      <button class="btn btn-sm btn-fw" onclick="exportExcel()">📊 Excelで書き出し</button>
      <button class="btn btn-sm btn-fw" style="color:var(--hint);font-size:11px" onclick="resetConfig()">設定リセット</button>
    </div>
  </aside>
  <main class="main">
    <div class="mi" id="mc">
      <div class="welcome">
        <h2>スキルカルテ管理</h2>
        <p>左の一覧からカルテを選ぶか、新しいカルテを作成してください。</p>
        <button class="btn btn-p" onclick="newEmp()">＋ 最初のカルテを作成</button>
      </div>
    </div>
  </main>
</div>

<div class="ov" id="ov">
  <div class="dlg">
    <h3 id="ov-title">確認</h3>
    <p id="ov-msg"></p>
    <div class="dlg-btns">
      <button class="btn" onclick="closeOv(false)">キャンセル</button>
      <button class="btn btn-d" id="ov-ok" onclick="closeOv(true)">削除する</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const SKILL_CATS = [
  { key:'調理技術', subs:['食材の知識','下処理','釜調理','スチコン','冷却器','ゼリー','形態食'] },
  { key:'衛生管理', subs:['衛生意識','衛生教育','衛生の運用'] },
  { key:'学校対応', subs:['礼儀・作法','栄養士との関係構築','児童・生徒への対応'] },
  { key:'組織構築', subs:['新人育成','応援要請頻度','言葉遣い','自立した組織づくり'] },
];
const SKILL_CATS_PART = [
  { key:'その他', subs:['受けた指示を理解できる','手が開いたら次の指示を聞くことができる','勝手に判断しない','きちんとコミュニケーションが取れる','急な欠勤が無い','業務への姿勢','早出や残業要請への対応'] },
];
const CONTRACT_TYPES = [
  { key:'社員',        badge:'b-blue',   sub:['責任者','副責任者','一般社員'] },
  { key:'ロングパート', badge:'b-purple', sub:[] },
  { key:'パート',      badge:'b-teal',   sub:[] },
];
const LEVELS = ['','初級','基礎','中級','上級','エキスパート'];
const CERT_OPTIONS = ['調理師','栄養士','管理栄養士'];
const CAT_COLORS = {'調理技術':'#2563a8','衛生管理':'#1a6b4a','学校対応':'#f0a500','組織構築':'#6b3fa0','その他':'#6b6b66'};

function defaultSkills(contract){
  const base=SKILL_CATS.flatMap(cat=>cat.subs.map(n=>({cat:cat.key,n,v:3})));
  if(contract==='ロングパート'||contract==='パート'){
    const extra=SKILL_CATS_PART.flatMap(cat=>cat.subs.map(n=>({cat:cat.key,n,v:3})));
    return [...base,...extra];
  }
  return base;
}

// ── Config (localStorage) ─────────────────────────────────────────────────────
// ★ここを書き換えてもOK（localStorageより優先されます）
const HARDCODED_URL = 'https://wlmomylacenzgtvcoxlb.supabase.co';
const HARDCODED_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsbW9teWxhY2Vuemd0dmNveGxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzE2MjUsImV4cCI6MjA5Njc0NzYyNX0.ld1XMUXd2tfU5AxdbTTcbTk5VZJ0UfcRI8FFDy9ALCc';

function getConfig(){
  if(HARDCODED_URL !== 'YOUR_SUPABASE_URL'){
    return {url: HARDCODED_URL, key: HARDCODED_KEY};
  }
  const url=localStorage.getItem('sb_url');
  const key=localStorage.getItem('sb_key');
  return (url&&key)?{url,key}:null;
}
function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim();
  const key=document.getElementById('cfg-key').value.trim();
  if(!url||!key){toast('URLとキーを両方入力してください',true);return;}
  localStorage.setItem('sb_url',url);
  localStorage.setItem('sb_key',key);
  location.reload();
}
function resetConfig(){
  if(!confirm('設定をリセットしますか？\nSupabaseの接続情報が削除されます。'))return;
  localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');
  location.reload();
}

// ── Supabase REST API ─────────────────────────────────────────────────────────
let SB_URL='', SB_KEY='';

async function sbFetch(path, opts={}){
  const res = await fetch(SB_URL+path, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer||'',
      ...opts.headers
    },
    method: opts.method||'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if(!res.ok){
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function dbGetAll(){
  setSyncState('ing');
  try{
    const rows = await sbFetch('/rest/v1/employees?select=id,data&order=data->name.asc');
    setSyncState('ok');
    return (rows||[]).map(r=>({...r.data, id:r.id}));
  }catch(e){
    setSyncState('ng');
    console.error('fetch error',e);
    return [];
  }
}
async function dbPut(emp){
  setSyncState('ing');
  try{
    await sbFetch('/rest/v1/employees', {
      method:'POST',
      prefer:'resolution=merge-duplicates',
      body:{id:emp.id, data:emp}
    });
    setSyncState('ok');
  }catch(e){
    setSyncState('ng');
    throw e;
  }
}
async function dbDel(id){
  setSyncState('ing');
  try{
    await sbFetch(`/rest/v1/employees?id=eq.${id}`,{method:'DELETE'});
    setSyncState('ok');
  }catch(e){
    setSyncState('ng');
    throw e;
  }
}

function setSyncState(s){

}

function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'#c0392b':'var(--accent)';

function openOv(title,msg,okLabel,cb){

function getActiveCats(emp){
  const c=emp?emp.contract:'';
  if(c==='ロングパート'||c==='パート') return [...SKILL_CATS,...SKILL_CATS_PART];
  return SKILL_CATS;
}
function catAvg(emp,cat){
  const ss=(emp.skills||[]).filter(s=>s.cat===cat);
  if(!ss.length)return 0;
  return (ss.reduce((a,s)=>a+s.v,0)/ss.length).toFixed(1);
}
function totalAvg(emp){
  const ss=emp.skills||[];
  if(!ss.length)return 0;
  return (ss.reduce((a,s)=>a+s.v,0)/ss.length).toFixed(1);
}
function getSkill(emp,cat,name){
  return (emp.skills||[]).find(s=>s.cat===cat&&s.n===name);
}

  editEmp.evaluator=document.getElementById('ed-evaluator').value;

      if(!editEmp.skills.find(s=>s.cat===cat.key&&s.n===sname))

// ── Radar ─────────────────────────────────────────────────────────────────────
function drawRadar(emp){
  const canvas=document.getElementById('radar');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=Math.min(W,H)/2-45;
  ctx.clearRect(0,0,W,H);
  const data=SKILL_CATS.map(cat=>({label:cat.key,v:parseFloat(catAvg(emp,cat.key)),color:CAT_COLORS[cat.key]}));
  const n=data.length;if(n<3)return;
  const gc='rgba(0,0,0,0.08)';
  for(let lv=1;lv<=5;lv++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=(-Math.PI/2)+(2*Math.PI/n)*i;
      const x=cx+Math.cos(a)*(r*lv/5),y=cy+Math.sin(a)*(r*lv/5);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.strokeStyle=gc;ctx.lineWidth=lv===5?.8:.5;ctx.stroke();
    if(lv===5){ctx.fillStyle='rgba(0,0,0,0.02)';ctx.fill()}
  }
  for(let i=0;i<n;i++){
    const a=(-Math.PI/2)+(2*Math.PI/n)*i;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.strokeStyle=gc;ctx.lineWidth=.5;ctx.stroke();
    const lx=cx+Math.cos(a)*(r+30),ly=cy+Math.sin(a)*(r+30);
    ctx.fillStyle=data[i].color;ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(data[i].label,lx,ly);
  }
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const a=(-Math.PI/2)+(2*Math.PI/n)*i;
    const x=cx+Math.cos(a)*(r*data[i].v/5),y=cy+Math.sin(a)*(r*data[i].v/5);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fillStyle='rgba(26,107,74,0.15)';ctx.fill();
  ctx.strokeStyle='#1a6b4a';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<n;i++){
    const a=(-Math.PI/2)+(2*Math.PI/n)*i;
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*(r*data[i].v/5),cy+Math.sin(a)*(r*data[i].v/5),5,0,2*Math.PI);
    ctx.fillStyle=data[i].color;ctx.fill();
  }
  const avg=totalAvg(emp);
  ctx.fillStyle='#1a1a18';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(avg,cx,cy);
  ctx.font='11px sans-serif';ctx.fillStyle='#9e9d97';ctx.fillText('総合',cx,cy+18);
}

// ── Excel Export ──────────────────────────────────────────────────────────────
function buildRows(list){
  const fixedHdrs=['苗字','名前','契約形態','小分類','事業所','入社年月','評価者'];
  const allCats=[...SKILL_CATS,...SKILL_CATS_PART];
  const skillHdrs=allCats.flatMap(cat=>cat.subs.map(s=>`[${cat.key}] ${s}`));
  const hdrs=[...fixedHdrs,...skillHdrs,'資格・認定','強み','育成課題'];
  const rows=list.map(e=>{
    const base=[e.lastName||'',e.firstName||'',e.contract||'',e.subType||'',e.dept||'',e.joined||'',e.evaluator||''];
    const svals=allCats.flatMap(cat=>cat.subs.map(sname=>{
      const sk=(e.skills||[]).find(s=>s.cat===cat.key&&s.n===sname);
      return sk?sk.v:'';
    }));
    return[...base,...svals,(e.certs||[]).join('、'),e.strength||'',e.dev||''];
  });
  return[hdrs,...rows];
}
function exportExcel(){
  if(!employees.length){toast('データがありません',true);return}
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(buildRows(employees));
  ws['!cols']=buildRows(employees)[0].map((_,i)=>({wch:i<8?14:10}));
  XLSX.utils.book_append_sheet(wb,ws,'全員');
  for(const ct of CONTRACT_TYPES){
    const list=employees.filter(e=>e.contract===ct.key);
    if(list.length){
      const ws2=XLSX.utils.aoa_to_sheet(buildRows(list));
      ws2['!cols']=buildRows(list)[0].map((_,i)=>({wch:i<8?14:10}));
      XLSX.utils.book_append_sheet(wb,ws2,ct.key);
    }
  }
  XLSX.writeFile(wb,`skill_carte_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excelを書き出しました');
}
function exportSingle(id){
  const emp=employees.find(e=>e.id===id);if(!emp)return;
  const wb=XLSX.utils.book_new();
  const rows=[
    ['苗字',emp.lastName||''],['名前',emp.firstName||''],
    ['契約形態',emp.contract||''],['小分類',emp.subType||''],
    ['事業所',emp.dept||''],
    ['入社年月',emp.joined||''],['評価者',emp.evaluator||''],
    [],['大分類','中分類','評価（1-5）','レベル'],
    ...SKILL_CATS.flatMap(cat=>cat.subs.map(sname=>{
      const sk=(emp.skills||[]).find(s=>s.cat===cat.key&&s.n===sname);
      return[cat.key,sname,sk?sk.v:'',sk?LEVELS[sk.v]:'未評価'];
    })),
    [],['資格・認定',(emp.certs||[]).join('、')],
    ['強み',emp.strength||''],['育成課題',emp.dev||''],
  ];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:20},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'カルテ');
  XLSX.writeFile(wb,`carte_${emp.name||emp.id}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excelを書き出しました');
}

// ── Password auth ─────────────────────────────────────────────────────────────
function checkPw(){
  const v=document.getElementById('pw-input').value;
  if(v==='skillcarte1001'){
    localStorage.setItem('sk_auth','ok');
    document.getElementById('auth-screen').style.display='none';
    startApp();
  }else{
    document.getElementById('pw-error').style.display='block';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function startApp(){
  const cfg=getConfig();
  if(!cfg){
    document.getElementById('setup-screen').style.display='block';
    return;
  }
  SB_URL=cfg.url;SB_KEY=cfg.key;
  document.getElementById('main-app').style.display='flex';
  employees=await dbGetAll();
  renderList();
}

(()=>{
  if(localStorage.getItem('sk_auth')==='ok'){
    startApp();
  }else{
    document.getElementById('auth-screen').style.display='block';
  }
})();
</script>
