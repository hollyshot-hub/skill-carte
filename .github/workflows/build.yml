name: Build and deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace Supabase credentials
        run: |
          sed -i "s|YOUR_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|YOUR_SUPABASE_ANON_KEY|${{ secrets.SUPABASE_KEY }}|g" index.html
          sed -i "s|if(HARDCODED_URL !== '${{ secrets.SUPABASE_URL }}')|if(HARDCODED_URL !== 'YOUR_SUPABASE_URL')|g" index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto: inject credentials"
          git push
